<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前端监控sdk</title>
  </head>
  <body>
    <div id="container">
      <div class="content">
        <!-- <input type="button" value="触发错误" onclick="errorClick()" />
        <input
          type="button"
          value="触发Promise错误"
          onclick="promiseErrorClick()"
        /> -->
        <input
          id="succesBtn"
          type="button"
          value="ajax成功"
          onclick="sendSuccess()"
        />
        <input
          id="errorBtn"
          type="button"
          value="ajax错误"
          onclick="sendError()"
        />
      </div>
    </div>
    <script>
      function sendSuccess() {
        let xhr = new XMLHttpRequest();
        xhr.open("GET", "/success", true);
        xhr.responseType = "json";
        xhr.onload = function () {
          console.log(this.response);
        };
        xhr.send();
      }
      function sendError() {
        let xhr = new XMLHttpRequest();
        xhr.open("POST", "/error", true);
        xhr.responseType = "json";
        xhr.onerror = function (e) {
          console.log(e);
        };
        xhr.send("name=7hao");
      }
      function errorClick() {
        window.a.b.click();
        throw new Error("This is a test error");
      }

      function promiseErrorClick() {
        Promise.reject(new Error("This is a test promise error"));
      }
    </script>
    <!-- <script src="123.js"></script> -->
  </body>
</html>
